name: Tooning Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - run: npm install
      
      - name: Compile
        run: npm run compile
        
      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package -o tooning.vsix

      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: tooning.vsix
          body_path: CHANGELOG.md # Or extract only latest from CHANGELOG
          draft: false
          prerelease: false
          name: Tooning v${{ steps.get_version.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
